[pytest]
testpaths = tests
asyncio_mode = auto
pythonpath = backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    e2e: End-to-end tests requiring Azure OpenAI credentials
    live_api: Tests requiring running backend infrastructure
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
